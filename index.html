function Assistant() {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([
    { role: "bot", text: `Hi! I'm ${DATA.name}'s AI assistant. Ask me about her background, skills, or availability.` }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bodyRef = useRef(null);
  const suggestions = ["What's her background?", "What are her key skills?", "Is she open to new roles?"];

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [msgs, loading]);

  async function send(text) {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput("");
    const next = [...msgs, { role: "user", text: q }];
    setMsgs(next);
    setLoading(true);
    try {
      const history = next.filter(m => m.role !== "bot" || m !== next[0])
        .map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text }));
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = data.reply;
      setMsgs(m => [...m, { role: "bot", text: reply || "Sorry, I didn't catch that. Could you rephrase?" }]);
    } catch (e) {
      setMsgs(m => [...m, { role: "bot", text: `Something went wrong on my end. You can always reach ${DATA.name} directly at ${DATA.email}.` }]);
    } finally {
      setLoading(false);
    }
  }

  if (!open) {
    return (
      <button className="ai-fab" onClick={() => setOpen(true)}>
        <span className="dot"></span> Ask my AI assistant
      </button>
    );
  }

  return (
    <div className="ai-panel">
      <div className="ai-head">
        <div className="t">
          <div className="avatar">{DATA.brandInitial}</div>
          <div>
            <div className="name">AI Assistant</div>
            <div className="status"><span className="d"></span> Online</div>
          </div>
        </div>
        <button className="ai-close" onClick={() => setOpen(false)}>×</button>
      </div>
      <div className="ai-body" ref={bodyRef}>
        {msgs.map((m,i) => <div key={i} className={`msg ${m.role}`}>{m.text}</div>)}
        {loading && <div className="msg bot" style={{padding:0}}><div className="typing"><span></span><span></span><span></span></div></div>}
        {msgs.length === 1 && !loading && (
          <div className="suggest">
            {suggestions.map((s,i) => <button key={i} onClick={() => send(s)}>{s}</button>)}
          </div>
        )}
      </div>
      <div className="ai-foot">
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="Ask a question…"
        />
        <button className="ai-send" disabled={loading || !input.trim()} onClick={() => send()}>↑</button>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const go = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: "smooth" }); };
  return (

  );
}
